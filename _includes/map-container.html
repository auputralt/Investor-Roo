<div class="map-container" data-map-id="{{ include.id }}">
  {% if include.title %}
  <div class="map-header">
    <h4 class="map-title">{{ include.title }}</h4>
    {% if include.subtitle %}
    <p class="map-subtitle">{{ include.subtitle }}</p>
    {% endif %}
  </div>
  {% endif %}
  
  <div class="map-wrapper">
    <div id="map-{{ include.id }}" class="map-canvas" 
         data-lat="{{ include.lat | default: -2.5 }}" 
         data-lng="{{ include.lng | default: 118.0 }}" 
         data-zoom="{{ include.zoom | default: 5 }}"
         data-region="{{ include.region | default: 'indonesia' }}">
    </div>
  </div>
  
  {% if include.legend %}
  <div class="map-legend">
    {% for item in include.legend %}
    <div class="legend-item">
      <span class="legend-color" data-color="{{ item.color }}"></span>
      <span class="legend-label">{{ item.label }}</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}
  
  {% if include.footnote %}
  <p class="map-footnote">{{ include.footnote }}</p>
  {% endif %}
</div>

<script>
  // Apply dynamic legend colors from data attributes.
  (function () {
    var root = document.querySelector('[data-map-id="{{ include.id }}"]');
    if (!root) return;
    var colorItems = root.querySelectorAll('.legend-color[data-color]');
    colorItems.forEach(function (el) {
      el.style.backgroundColor = el.getAttribute('data-color') || '';
    });
  })();
</script>
