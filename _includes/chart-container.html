<div class="chart-container" data-chart-type="{{ include.type }}" data-chart-id="{{ include.id }}">
  {% if include.title %}
  <div class="chart-header">
    <h4 class="chart-title">{{ include.title }}</h4>
    {% if include.subtitle %}
    <p class="chart-subtitle">{{ include.subtitle }}</p>
    {% endif %}
  </div>
  {% endif %}
  
  <div class="chart-wrapper">
    <canvas id="chart-{{ include.id }}"></canvas>
  </div>
  
  {% if include.footnote %}
  <p class="chart-footnote">{{ include.footnote }}</p>
  {% endif %}
</div>

<script type="application/json" id="chart-data-{{ include.id }}">
{{
  {
    "type": include.type,
    "labels": include.labels,
    "datasets": include.datasets,
    "options": include.options | default: {}
  } | jsonify
}}
</script>
<script>
  // Load chart data from JSON script so Liquid doesn't break JS parsing in editors.
  window.chartData = window.chartData || {};
  (function () {
    var dataEl = document.getElementById('chart-data-{{ include.id }}');
    if (!dataEl) return;
    try {
      window.chartData['{{ include.id }}'] = JSON.parse(dataEl.textContent);
    } catch (e) {
      console.error('Invalid chart data for {{ include.id }}', e);
    }
  })();
</script>
